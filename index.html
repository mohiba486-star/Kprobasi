<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Creator Mini App</title>
    
    <!-- টেলিগ্রাম অফিশিয়াল ওয়েব অ্যাপ স্ক্রিপ্ট -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- আপনার মনিট্যাগ SDK স্ক্রিপ্ট -->
    <script src='//libtl.com/sdk.js' data-zone='11069245' data-sdk='show_11069245'></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* স্টার্ট স্ক্রিন প্যানেল */
        #start-screen {
            display: block;
        }
        .logo-icon {
            font-size: 60px;
            color: #0088cc;
            margin-bottom: 15px;
        }
        
        /* মেইন অ্যাপ স্ক্রিন */
        #main-app {
            display: none;
        }
        
        h1 { 
            color: #0088cc; 
            font-size: 24px; 
            margin-bottom: 10px;
        }
        p { 
            color: #666; 
            font-size: 14px; 
            line-height: 1.5;
        }
        
        /* ছোট ও আকর্ষণীয় বাটন */
        .btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            width: auto;
            min-width: 140px;
            margin-top: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 3px 10px rgba(0, 136, 204, 0.2);
            display: inline-block;
        }
        .btn:active {
            background-color: #006699;
            transform: scale(0.98);
        }
        
        /* আইডিয়া বক্স */
        .idea-box {
            margin-top: 25px;
            padding: 15px;
            background: #eef7fc;
            border-left: 5px solid #0088cc;
            border-radius: 8px;
            min-height: 50px;
            display: none;
        }
        .idea-box p {
            font-weight: bold; 
            color: #333; 
            font-size: 16px;
            margin: 0;
        }
        .footer-text {
            font-size: 11px;
            color: #aaa;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<!-- ১. সুন্দর স্টার্ট স্ক্রিন -->
<div id="start-screen" class="container">
    <div class="logo-icon">🤖</div>
    <h1>AI প্রো প্রবাসী অ্যাপ</h1>
    <p>এআই দিয়ে হাই-রেজোলিউশন ব্যানার এবং আকর্ষণীয় পোস্টার আইডিয়া তৈরি করার দুনিয়ায় আপনাকে স্বাগতম।</p>
    <button class="btn" onclick="startApp()">স্টার্ট (Start)</button>
</div>

<!-- ২. মূল অ্যাপ স্ক্রিন -->
<div id="main-app" class="container">
    <h1>AI ব্যানার ও পোস্টার মেকার</h1>
    <p>নিচের বাটনে ক্লিক করলেই আপনার জন্য নতুন আইডিয়া তৈরি হবে এবং সাথে সাথে একটি স্পনসরড বিজ্ঞাপন লোড হবে।</p>

    <button class="btn" onclick="generateIdeaWithAd()">নতুন আইডিয়া তৈরি করুন</button>

    <div id="idea-container" class="idea-box">
        <p id="idea-text"></p>
    </div>

    <p class="footer-text">Sponsored by Monetag</p>
</div>

<script>
    // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজ করা
    const tg = window.Telegram.WebApp;
    tg.expand();

    // স্টার্ট বাটনের ফাংশন
    function startApp() {
        if (tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('medium'); // মোবাইল হালকা ভাইব্রেট হবে
        }
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
    }

    // নতুন আইডিয়া এবং মনিট্যাগ ইন-অ্যাপ পপ-আপ অ্যাড ওপেন করার ফাংশন
    function generateIdeaWithAd() {
        if (tg.HapticFeedback) {
            tg.HapticFeedback.notificationOccurred('success'); // সাকসেস ভাইব্রেশন
        }

        // মনিট্যাগের রিওয়ার্ডেড পপ-আপ ফাংশন
        if (typeof show_11069245 === 'function') {
            show_11069245('pop').then(() => {
                console.log('বিজ্ঞাপন সফলভাবে দেখানো হয়েছে।');
            }).catch((e) => {
                console.error('বিজ্ঞাপন প্রদর্শনে সমস্যা হয়েছে:', e);
            });
        }

        // ডাইরেক্ট লিঙ্ক ব্যাকআপ হিসেবে ওপেন হবে
        const adUrl = "https://omg10.com/4/11068678";
        window.open(adUrl, '_blank');

        // এআই আইডিয়া লিস্ট
        const ideas = [
            "সিনেম্যাটিক ৯:১৬ রেশিও এআই পোস্টার ডিজাইন",
            "ফাউন্ডেশনের জন্য আকর্ষণীয় প্রচ্ছদ ব্যানার",
            "এইচডি কোয়ালিটি লোগো ও থিম আইডিয়া",
            "আল্ট্রা-রিয়েলিস্টিক পোর্ট্রেট আর্ট ডিজাইন",
            "৮কে আল্ট্রা-রিয়েলিস্টিক ফেসবুক কভার ডিজাইন",
            "সোশ্যাল মিডিয়া প্রমোশনাল ব্যানার আর্ট"
        ];

        const randomIdea = ideas[Math.floor(Math.random() * ideas.length)];
        
        document.getElementById('idea-text').innerText = randomIdea;
        document.getElementById('idea-container').style.display = "block";
    }
</script>

</body>
</html>
